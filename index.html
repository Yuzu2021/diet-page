<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>apricot gym</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Hiragino Kaku Gothic ProN", sans-serif;
  line-height: 1.6;
  background: linear-gradient(#111, #ffcc00);
  color: #fff;
}

/* 共通 /
.container {
  max-width: 1000px;
  margin: auto;
  padding: 0 15px;
}

/ ヘッダー /
header {
  background: #000;
  color: #ffcc00;
}

.header-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
}

header h1 {
  margin: 0;
  font-size: 20px;
}

/ Instagram /
.insta-header {
  width: 22px;
}

/ ===== プランエリア ===== /
.plan-box {
  margin: 30px 0;
}

.plan-card {
  display: flex;
  flex-wrap: wrap;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

.plan-left {
  flex: 1;
  background: #b6ff00;
  color: #000;
  padding: 20px;
}

.plan-left p {
  margin: 0;
  font-size: 14px;
}

.plan-left h2 {
  margin: 5px 0 0;
  font-size: 22px;
}

.plan-middle {
  flex: 1;
  background: #fff;
  color: #000;
  padding: 20px;
  text-align: center;
}

.plan-middle h3 {
  margin: 0;
  font-size: 18px;
}

.plan-middle p {
  font-size: 13px;
  margin-top: 5px;
}

.plan-right {
  flex: 1;
  background: #fff;
  color: #000;
  padding: 20px;
  text-align: center;
}

.plan-right h2 {
  margin: 0;
  font-size: 22px;
}

.plan-right p {
  margin-top: 5px;
  font-size: 14px;
}

/ ===== CTA ===== /
.cta-character {
  text-align: center;
  padding: 40px 15px;
}

.cta-character img {
  width: 100%;
  max-width: 320px;
  border-radius: 12px;
  margin-bottom: 15px;
}

.limit {
  color: #ff4444;
  font-weight: bold;
  margin-bottom: 15px;
}

.cta-btn {
  display: inline-block;
  background: #06C755;
  color: #fff;
  padding: 14px 26px;
  border-radius: 50px;
  text-decoration: none;
  font-size: 16px;
  font-weight: bold;
}

.cta-btn:hover {
  transform: scale(1.05);
}

/ フッター /
footer {
  background: #000;
  text-align: center;
  padding: 20px;
}

/ 固定LINE */
.line-fixed {
  position: fixed;
  bottom: 20px;
  right: 15px;
  background: #06C755;
  color: #fff;
  padding: 14px 18px;
  border-radius: 50px;
  text-decoration: none;
  font-size: 14px;
}
</style>
</head>

<body>

<header>
  <div class="container header-inner">
    <h1>🔥 APRICOT GYM 🔥</h1>
    <a href="https://www.instagram.com/apricotgym2026">
      <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" class="insta-header">
    </a>
  </div>
</header>

<div class="container">

  <!-- プラン -->
  <section class="plan-box">
    <div class="plan-card">

      <div class="plan-left">
        <p>※完全マンツーマン</p>
        <h2>ダイエットプラン</h2>
      </div>

      <div class="plan-middle">
        <h3>週2回（50分×計48回）</h3>
        <p>食事指導・メニュー管理付き</p>
      </div>

      <div class="plan-right">
        <h2>¥384,000 / 6ヶ月</h2>
        <p>1回あたり8,000円</p>
      </div>

    </div>
  </section>

</div>

<!-- CTA -->
<section class="cta-character">
    <img src="taikengym.jpg" alt="ジム画像">

    <p class="limit">
      【残り3名】今月の新規受付はあとわずか
    </p>

    <a href="https://lin.ee/xUmAtVC" class="cta-btn">
      LINEで無料相談する
    </a>
</section>

<footer>
  <p>© apricot gym</p>
</footer>

<a href="https://lin.ee/xUmAtVC" class="line-fixed">LINE予約</a>

</body>
</html>
